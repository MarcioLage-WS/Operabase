<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Operabase - Performance</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-slate-200 min-h-screen">

<div class="flex">

  <!-- SIDEBAR -->
  <aside class="w-64 bg-slate-900 border-r border-slate-800 min-h-screen p-6">
    <h1 class="text-xl font-bold mb-6">OPERABASE</h1>
    <nav class="space-y-3 text-sm">
      <a href="dashboard.html" class="block px-3 py-2 rounded bg-slate-800">Dashboard</a>
      <a href="novo-chamado.html" class="block px-3 py-2 rounded hover:bg-slate-800">Chamados</a>
    </nav>
  </aside>

  <!-- CONTEÚDO -->
  <div class="flex-1 p-8 space-y-10">

    <h2 class="text-2xl font-semibold">Painel de Performance</h2>

    <!-- KPI MÊS -->
    <div class="grid grid-cols-5 gap-6" id="kpis"></div>

    <!-- RISCO -->
    <div class="grid grid-cols-4 gap-6" id="risco"></div>

    <!-- VOLUME MENSAL -->
    <div class="bg-slate-900 p-6 rounded-xl border border-slate-800">
      <h3 class="text-lg font-semibold mb-4">Volume últimos 6 meses</h3>
      <table class="w-full text-sm">
        <thead class="text-slate-400 border-b border-slate-800">
          <tr>
            <th class="text-left py-2">Mês</th>
            <th>Total</th>
            <th>Resolvidos</th>
            <th>Tempo Médio</th>
            <th>Satisfação</th>
          </tr>
        </thead>
        <tbody id="volumeTabela"></tbody>
      </table>
    </div>

    <!-- RANKING -->
    <div class="bg-slate-900 p-6 rounded-xl border border-slate-800">
      <h3 class="text-lg font-semibold mb-4">Performance Analistas</h3>
      <table class="w-full text-sm">
        <thead class="text-slate-400 border-b border-slate-800">
          <tr>
            <th>Responsável</th>
            <th>Total</th>
            <th>Resolvidos</th>
            <th>Tempo Médio</th>
            <th>Satisfação</th>
            <th>% SLA OK</th>
          </tr>
        </thead>
        <tbody id="rankingTabela"></tbody>
      </table>
    </div>

  </div>
</div>

<script type="module">
import { supabase } from './js/supabaseClient.js'

// KPI MÊS
const { data: kpi } = await supabase.from('vw_kpi_mes_atual').select('*').single()
const { data: comparacao } = await supabase.from('vw_comparacao_mensal').select('*').single()
const { data: risco } = await supabase.from('vw_sla_risco').select('*').single()
const { data: volume } = await supabase.from('vw_volume_mensal_6_meses').select('*')
const { data: ranking } = await supabase.from('vw_performance_analistas').select('*')

// KPIs
document.getElementById("kpis").innerHTML = `
<div class="bg-slate-900 p-5 rounded-xl border border-slate-800">
  <p class="text-sm text-slate-400">Total Mês</p>
  <h3 class="text-2xl font-bold">${kpi.total_chamados_mes}</h3>
</div>

<div class="bg-slate-900 p-5 rounded-xl border border-slate-800">
  <p class="text-sm text-slate-400">Variação</p>
  <h3 class="text-2xl font-bold">${comparacao.variacao_percentual}%</h3>
</div>

<div class="bg-slate-900 p-5 rounded-xl border border-slate-800">
  <p class="text-sm text-slate-400">Tempo Médio</p>
  <h3 class="text-2xl font-bold">${kpi.tempo_medio_resolucao ?? 0}h</h3>
</div>

<div class="bg-slate-900 p-5 rounded-xl border border-slate-800">
  <p class="text-sm text-slate-400">% SLA OK</p>
  <h3 class="text-2xl font-bold">${kpi.percentual_dentro_sla ?? 0}%</h3>
</div>

<div class="bg-slate-900 p-5 rounded-xl border border-slate-800">
  <p class="text-sm text-slate-400">Satisfação</p>
  <h3 class="text-2xl font-bold">${kpi.satisfacao_media ?? 0}</h3>
</div>
`

// RISCO
document.getElementById("risco").innerHTML = `
<div class="bg-red-900/30 p-5 rounded-xl border border-red-500">
  <p>SLA Violado</p>
  <h3 class="text-2xl font-bold">${risco.chamados_sla_violado}</h3>
</div>

<div class="bg-yellow-900/30 p-5 rounded-xl border border-yellow-500">
  <p>Em Alerta</p>
  <h3 class="text-2xl font-bold">${risco.chamados_em_alerta}</h3>
</div>

<div class="bg-purple-900/30 p-5 rounded-xl border border-purple-500">
  <p>Críticos</p>
  <h3 class="text-2xl font-bold">${risco.chamados_criticos}</h3>
</div>

<div class="bg-slate-900 p-5 rounded-xl border border-slate-700">
  <p>Total Abertos</p>
  <h3 class="text-2xl font-bold">${risco.total_abertos}</h3>
</div>
`

// VOLUME
document.getElementById("volumeTabela").innerHTML =
volume.map(v => `
<tr class="border-b border-slate-800">
  <td class="py-2">${v.mes}</td>
  <td>${v.total_chamados}</td>
  <td>${v.total_resolvidos}</td>
  <td>${v.tempo_medio_resolucao ?? 0}</td>
  <td>${v.satisfacao_media ?? 0}</td>
</tr>
`).join('')

// RANKING
document.getElementById("rankingTabela").innerHTML =
ranking.map(r => `
<tr class="border-b border-slate-800">
  <td>${r.responsavel_id}</td>
  <td>${r.total_atendimentos}</td>
  <td>${r.total_resolvidos}</td>
  <td>${r.tempo_medio_resolucao ?? 0}</td>
  <td>${r.satisfacao_media ?? 0}</td>
  <td>${r.percentual_dentro_sla ?? 0}%</td>
</tr>
`).join('')
</script>

</body>
</html>
