<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-slate-950 text-slate-200 min-h-screen">

<div class="flex">

  <!-- SIDEBAR -->
  <aside class="w-64 bg-slate-900 border-r border-slate-800 min-h-screen flex flex-col">

    <div class="p-6 border-b border-slate-800 flex items-center gap-3">
      <div class="w-8 h-8 rounded-lg bg-gradient-to-r from-blue-500 to-purple-500 flex items-center justify-center font-bold">
        ⚡
      </div>
      <span class="font-bold text-lg">OPERABASE</span>
    </div>

    <nav class="flex-1 p-4 space-y-2">

      <a href="dashboard.html"
         class="flex items-center gap-3 px-4 py-2 rounded-lg bg-gradient-to-r from-blue-600 to-purple-600">
        📊 Dashboard
      </a>

      <a href="novo-chamado.html"
         class="flex items-center gap-3 px-4 py-2 rounded-lg hover:bg-slate-800 transition">
        🎫 Chamados
      </a>

    </nav>

    <div class="p-4 border-t border-slate-800 text-sm text-slate-400">
      Recolher
    </div>

  </aside>


  <!-- CONTEÚDO -->
  <div class="flex-1 flex flex-col">

    <!-- HEADER -->
    <header class="bg-slate-900 border-b border-slate-800 px-6 py-4 flex justify-between items-center">

      <h1 class="text-xl font-semibold">Dashboard</h1>

      <div id="userInfo" class="flex items-center gap-3">
        <div class="w-8 h-8 rounded-full bg-gradient-to-r from-purple-500 to-blue-500 flex items-center justify-center text-sm font-bold">
          M
        </div>
        <div class="text-sm">
          <div id="userName" class="font-medium"></div>
          <div class="text-xs text-slate-400" id="userRole"></div>
        </div>
      </div>

    </header>


    <!-- MAIN -->
    <main class="p-6 space-y-6">

      <!-- HERO -->
      <div class="rounded-xl p-6 bg-gradient-to-r from-blue-900/40 to-purple-900/40 border border-slate-800">
        <h2 class="text-2xl font-semibold mb-2">Olá 👋</h2>
        <p class="text-slate-400">Aqui está o resumo da sua operação.</p>
      </div>

      <!-- CARDS -->
      <div class="grid grid-cols-3 gap-6">

        <div class="bg-slate-900 p-6 rounded-xl border border-slate-800">
          <p class="text-slate-400 text-sm">Total de Chamados</p>
          <h3 class="text-3xl font-bold mt-2">--</h3>
        </div>

        <div class="bg-slate-900 p-6 rounded-xl border border-slate-800">
          <p class="text-slate-400 text-sm">Em Aberto</p>
          <h3 class="text-3xl font-bold mt-2">--</h3>
        </div>

        <div class="bg-slate-900 p-6 rounded-xl border border-slate-800">
          <p class="text-slate-400 text-sm">SLA Violado</p>
          <h3 class="text-3xl font-bold mt-2">--</h3>
        </div>

      </div>

    </main>

  </div>

</div>


<script type="module">
import { supabase } from './js/supabaseClient.js'

const { data: { user } } = await supabase.auth.getUser()

if (!user) {
  window.location.href = "index.html"
}

const { data: perfil } = await supabase
  .from('perfis')
  .select('*')
  .eq('id', user.id)
  .single()

document.getElementById("userName").innerText = perfil.nome
document.getElementById("userRole").innerText = perfil.role
</script>

</body>
</html>
