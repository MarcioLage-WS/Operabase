<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>Novo Chamado</title>
</head>
<body>

<h1>Abrir Chamado</h1>

<form id="formChamado">
  <input type="text" id="titulo" placeholder="Título" required>
  <br><br>
  <textarea id="descricao" placeholder="Descrição" required></textarea>
  <br><br>
  <button type="submit">Abrir Chamado</button>
</form>

<script type="module">
import { supabase } from './js/supabaseClient.js'

const { data: { user } } = await supabase.auth.getUser()

if (!user) {
  window.location.href = "index.html"
}

document.getElementById("formChamado").addEventListener("submit", async (e) => {
  e.preventDefault()

  const titulo = document.getElementById("titulo").value
  const descricao = document.getElementById("descricao").value

  // Buscar perfil para pegar empresa_id
  const { data: perfil } = await supabase
    .from('perfis')
    .select('*')
    .eq('id', user.id)
    .single()

  const { error } = await supabase
    .from('chamados')
    .insert({
      empresa_id: perfil.empresa_id,
      titulo,
      descricao,
      solicitante_id: user.id
    })

  if (error) {
    alert("Erro ao abrir chamado: " + error.message)
  } else {
    alert("Chamado aberto com sucesso!")
  }
})
</script>

</body>
</html>
